<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <script src="./features.js" defer></script>
    <script src="./script.js" defer></script>
    <script src="./clavier.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <header>
        <div></div>
        <h1>Hangman</h1>
        <div>
            <img id="ShadowMode" src="./img/lune.png" alt="Dark Mode">
        </div>
    </header>

    <main>
        <button id="rejouer">Play Again</button>

        <div id="mainContent">
            <div id="reglesDiv">
                <div id="reglesText">
                    <h2>Game Rules</h2>
                    <p><strong>Objective:</strong> Guess the hidden word before the hangman is complete.</p>
                    <ul>
                        <li>Type a letter on your keyboard.</li>
                        <li>Each mistake adds a line to the drawing.</li>
                        <li>You have a maximum of errors in function of your difficulty level.</li>
                    </ul>
                    <p><em>Good luck!</em></p>

                    <div id="importZone">
                        <label for="importJson" id="btnImportLabel">Import a dictionary (JSON)</label>
                        <input type="file" id="importJson" accept=".json">
                        <button id="btnResetDico">Default Dictionary</button>
                    </div>

                    <div id="difficulty">
                        <h2>Difficulty</h2>
                        <div>
                            <button class="btnDifficulty" id="easy">Easy (10 attempts)</button>
                            <button class="btnDifficulty" id="medium">Medium (8 attempts)</button>
                            <button class="btnDifficulty" id="hard">Hard (5 attempts)</button>
                        </div>
                    </div>
                </div>
                <button id="regles">Settings</button>
            </div>

            <div id="game">
                <canvas id="canvas"></canvas>
                <div id="word"></div>
                <div id="lettersUsed"></div>
                <div id="clavier"></div>
            </div>

            <div></div>
        </div>
    </main>
</body>

</html>
